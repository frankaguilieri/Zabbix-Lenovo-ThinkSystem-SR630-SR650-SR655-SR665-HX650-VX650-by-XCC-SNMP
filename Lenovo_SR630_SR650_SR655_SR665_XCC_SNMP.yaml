  triggers:
  - expression: max(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/icmpping,3m)=0
    name: 'XCC: not responding to ICMP (unreachable)'
    priority: HIGH
    description: The XCC management IP has not answered ping for 3 minutes.
    uuid: 48ef998f44c448dd8fd08bc56df35c5d
  - expression: min(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN}
    name: 'XCC: perda de pacotes ICMP alta (>{$ICMP_LOSS_WARN}%)'
    priority: WARNING
    dependencies:
    - name: 'XCC: not responding to ICMP (unreachable)'
      expression: max(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/icmpping,3m)=0
    uuid: 32554ccdfa814ad1a6a18fa506a8f327
  - expression: max(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/zabbix[host,snmp,available],5m)=0
    name: 'SNMP: XCC agent is not responding'
    priority: AVERAGE
    description: Zabbix flagged the SNMP interface as unavailable. Check credentials, the SNMP ACL on the XCC, and connectivity.
    dependencies:
    - name: 'XCC: not responding to ICMP (unreachable)'
      expression: max(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/icmpping,3m)=0
    uuid: ad90d43f8c7349bc97c2e61f3cfc2aaa
  - expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/system.health.status)={$HEALTH_CRIT_STATUS} or last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/system.health.status)={$HEALTH_DISASTER_STATUS}
    name: Overall system health is CRITICAL
    priority: HIGH
    manual_close: 'YES'
    dependencies:
    - name: Server is powered off
      expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/system.power.state)<>255
    uuid: 64e5db70954b4b57b26c7ee5b80c8af8
  - expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/system.health.status)={$HEALTH_WARN_STATUS}
    name: Overall system health is degraded (non-critical)
    priority: WARNING
    manual_close: 'YES'
    dependencies:
    - name: Server is powered off
      expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/system.power.state)<>255
    uuid: e5dd3e05820d48f2bf7d7d3fba51936f
  - expression: nodata(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/system.health.status,{$SNMP.TIMEOUT})=1
    name: 'SNMP: no data from XCC for {$SNMP.TIMEOUT}'
    priority: AVERAGE
    description: No SNMP data received within the defined window. Distinguishes "component OK" from "polling stopped".
    dependencies:
    - name: 'SNMP: XCC agent is not responding'
      expression: max(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/zabbix[host,snmp,available],5m)=0
    - name: 'XCC: not responding to ICMP (unreachable)'
      expression: max(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/icmpping,3m)=0
    uuid: 3254486eabb84c4bbc4d1ca4ff2fb065
  - expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/system.power.state)<>255
    name: Server is powered off
    priority: INFO
    description: currentSysPowerStatus indicates the server is not powered on (255=poweredOn). The XCC keeps answering SNMP. While active, this trigger suppresses component alerts (fan, overall health, etc.) to avoid false positives.
    manual_close: 'YES'
    uuid: 4a3716253c6244cd87c6bf63b1c043fb
  - expression: avg(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/power.consumption,5m)>{$POWER_MAX}
    name: 'Power draw above threshold: >{$POWER_MAX}W'
    priority: WARNING
    description: 'Last value: {ITEM.LASTVALUE1}. Check workload and power-supply redundancy.'
    manual_close: 'YES'
    uuid: 38ad26c8bae3481a93d07ca12a949d4a
  - expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/psu.failed.count)>=1 and last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/psu.installed.count)>=2
    name: 'PSU: redundancy lost (one or more supplies degraded)'
    priority: HIGH
    description: With 2+ supplies installed, at least one is not in Normal state - the system has lost N+N redundancy.
    manual_close: 'YES'
    uuid: d8df69b076eb4dacbc11bf65b12b73dd
  - expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/raid.oob_capable)=0
    name: RAID Out-of-band monitoring is disabled on the XCC
    priority: INFO
    description: Enable it under BMC Configuration > Storage in the XCC to collect disks and controllers.
    manual_close: 'YES'
    uuid: 83a251ecbc1f4964965f624bd21a81cb
  - expression: find(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/snmptrap["Lenovo XCC"],,"iregexp","{$TRAP.SEVERITY_MATCHES}")=1
    name: High-severity trap received from XCC
    priority: HIGH
    description: 'Last trap: {ITEM.LASTVALUE1}. Trap whose text matched {$TRAP.SEVERITY_MATCHES}.'
    manual_close: 'YES'
    uuid: ce36946b31b748da9d0ba29325c9247b
  - expression: find(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/snmptrap["Lenovo XCC"],,"iregexp","(?i)(warning|non-critical|degrad)")=1
    name: Warning trap received from XCC
    priority: WARNING
