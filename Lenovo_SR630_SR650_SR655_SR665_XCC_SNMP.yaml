    macros:
    - macro: '{$DISK_OK_STATUS}'
      value: Normal
    - macro: '{$FAN_OK_STATUS}'
      value: Normal
    - macro: '{$PSU_OK_STATUS}'
      value: Normal
    - macro: '{$HEALTH_CRIT_STATUS}'
      value: '2'
    - macro: '{$HEALTH_DISASTER_STATUS}'
      value: '0'
    - macro: '{$HEALTH_WARN_STATUS}'
      value: '4'
    - macro: '{$NAME.NOT_MATCHES}'
      value: DTS
      description: Excludes internal temperature sensors (DTS) from discovery
    - macro: '{$TEMP_CRIT}'
      value: '60'
    - macro: '{$TEMP_CRIT:"Ambient"}'
      value: '35'
    - macro: '{$TEMP_CRIT_LOW}'
      value: '5'
    - macro: '{$TEMP_WARN}'
      value: '50'
    - macro: '{$TEMP_WARN:"Ambient"}'
      value: '32'
    - macro: '{$POWER_MAX}'
      value: '1400'
      description: Power draw (W) above which an alert is raised. Adjust to the installed power supply/supplies.
    - macro: '{$HBA_FC.NAME_MATCHES}'
      value: .*([Ff]ibre.?[Cc]hannel| FC |FC$|LPe[0-9]|LPm[0-9]|QLE[0-9]|QLogic.*FC|Emulex.*FC).*
      description: Regex that matches genuine Fibre Channel HBAs in the adapter port table. A port must match this AND must NOT match {$HBA_FC.NAME_NOT_MATCHES}. Adjust to the name reported by your HBA.
    - macro: '{$HBA_FC.NAME_NOT_MATCHES}'
      value: .*([Ee]thernet|OCP| ?GbE|RoCE|iSCSI|SFP28|10/25|10/40|NIC|RDMA|BASE-T).*
      description: Regex that excludes Ethernet/NIC adapters from HBA FC discovery. Broadcom/Emulex/QLogic also make Ethernet NICs, so a name matching these terms is treated as a network card, not an HBA.
    - macro: '{$GPU.NAME_MATCHES}'
      value: .*(NVIDIA|Tesla|A2|A10|A16|A30|A40|A100|L4|L40|H100|GPU).*
      description: Regex used to identify GPUs. Inventory only (the XCC MIB does not expose GPU health/temperature via SNMP).
    - macro: '{$SNMP.TIMEOUT}'
      value: 10m
      description: No-data window that characterizes loss of SNMP polling.
    - macro: '{$ICMP_LOSS_WARN}'
      value: '20'
    - macro: '{$ICMP_RESPONSE_TIME_WARN}'
      value: '0.15'
    - macro: '{$DRIVE_LIFE_WARN}'
      value: '10'
      description: SSD remaining-life percentage below which an alert is raised.
    - macro: '{$TRAP.SEVERITY_MATCHES}'
      value: (?i)(critical|error|fail|fault|non-recover)
      description: Severity regex for XCC traps that should raise a HIGH alert.
    valuemaps:
    - uuid: 9534fbaa41ad4301aa3cd05bd3b6bfc2
