zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: b2e1cf82dfb140c481c694efb3427c63
    name: Templates/Servers Hardware
  templates:
  - uuid: 36266843df6941f7b39661466d9b465a
    template: Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP
    name: Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP
    description: |-
      Autor: Frank Aguilieri
      Data: 15/07/2026
      GitHub: https://github.com/frankaguilieri/Zabbix-Lenovo-ThinkSystem-SR630-SR650-SR655-SR665-HX650-VX650-by-XCC-SNMP

      SNMP template for Lenovo ThinkSystem SR630, SR650, SR655 and SR665 (all generations) via the XClarity Controller (XCC) SNMP agent, LENOVO-XCC-MIB (1.3.6.1.4.1.19046.11.1).

      Coverage: memory, power supplies (PSU) + redundancy, disks (basic health plus per-drive stats: predictive failure, media errors, SSD remaining life, temperature), battery (RAID controller status/voltage/temperature and system battery via the voltage table), processor, fans (status + numeric speed), network interfaces, Fibre Channel HBA, power consumption (total + CPU/memory/other + available/remaining), temperature, voltage, GPU (inventory), firmware, LEDs, SNMP trap and availability (ICMP + SNMP).

      =======================================================================
      SERVER-SIDE CONFIGURATION (XCC) - required before the host will poll
      =======================================================================
      These ThinkSystem servers (XCC / XCC2) only provide an SNMPv3 agent for polling; SNMPv1/v2c is available for traps only. The management port is out-of-band and stays up even when the server is powered off.

      1) GLOBAL SNMP AGENT - Web: BMC Configuration > Network > SNMP.
         - Enable the SNMPv3 Agent.
         - Fill in Contact and Location (mandatory - the agent will NOT persist without them).
         - CLI equivalent (SSH into the XCC): snmp -a3 enabled -l <location> -cn <contact>
         - Verify with 'snmp' (no args); it must show '-a3 enabled'.

      2) GLOBAL SECURITY - disable forced password change at first login.
         A freshly created/default account is in a 'must change password at first login' state and will NOT authenticate over SNMP until that is cleared. Disable it so the monitoring account is usable non-interactively:
         - Web: BMC Configuration > Security > (Password/Account Security Level or Global Login Settings) > turn OFF 'Force user to change password on first access' (a.k.a. 'Change password at first login').
         - Also make sure the monitoring account's password is set and not expired.

      3) MONITORING USER - create a read-only account with SNMP access and SNMPv3 auth/priv.
         On this firmware family the SNMPv3 authentication passphrase is the account login password (-p) and only the privacy passphrase is set separately (-spw). Configure via CLI (adjust the account index shown by 'users'):
           users -N <index> -p "<LOGIN/AUTH_PASS>" -ai web|ssh|snmp -sauth HMAC-SHA -spriv AES -spw "<PRIV_PASS>" -sacc Get
         - '-ai ...|snmp' grants SNMP to the account; '-sacc Get' makes it read-only.
         - -sauth HMAC-SHA  => authentication protocol SHA-1.
         - -spriv AES       => privacy protocol AES-128.
         - Both passphrases must be >= 8 characters.
         - The web 'SNMP Settings' toggle on the user often reverts if auth/priv are incomplete; the CLI form above persists reliably.
         - Verify with 'users' (the account must show the 'snmp' attribute).

      4) TRAPS (optional) - BMC Configuration > Notification > SNMP Trap; point the destination to the Zabbix server/proxy IP (UDP 162).

      5) VALIDATE from the Zabbix server/proxy before creating the host:
           SNMPCONFPATH=/dev/null snmpget -v3 -l authPriv -u <user> -a SHA -A "<AUTH_PASS>" -x AES -X "<PRIV_PASS>" <XCC_IP> 1.3.6.1.2.1.1.1.0

      =======================================================================
      ZABBIX-SIDE CONFIGURATION - Host SNMP interface (SNMPv3)
      =======================================================================
      Create the host pointing to the XCC management IP (NOT the OS IP) and add an SNMP interface. In the interface, set SNMP version = SNMPv3 and fill the security fields to match EXACTLY what worked in the snmpget above:

         Field (Zabbix)            Value
         -----------------------  -------------------------------------------
         SNMP version             SNMPv3
         Context name             (leave empty)
         Security name            <monitoring user, e.g. zabbix_mon>
         Security level           authPriv
         Authentication protocol  SHA1        (XCC uses HMAC-SHA = SHA-1; do NOT use SHA224/256/384/512)
         Authentication passphrase <the account login password / -A value>
         Privacy protocol         AES128      (XCC uses AES; do NOT use AES192/256 or DES)
         Privacy passphrase       <the -X / -spw value>

      IMPORTANT: these ThinkSystem XCCs only support SHA-1 for authentication and AES-128 for privacy on the user profile. Selecting SHA256/AES256 in Zabbix will fail authentication/decryption even though the credentials are 'correct'. Any mismatch here reproduces errors like 'Unknown user name', 'authentication failure' or 'decryption error'.

      You can hard-code these values on the interface or reference macros and set them per host, e.g. Security name = {$SNMPV3_USER}, Auth passphrase = {$SNMPV3_AUTHPASS}, Priv passphrase = {$SNMPV3_PRIVPASS} (define them on the host, ideally as Secret macros). Then link this template and adjust the tuning macros ({$POWER_MAX}, temperature thresholds, {$HBA_FC.NAME_MATCHES} / {$HBA_FC.NAME_NOT_MATCHES}, {$GPU.NAME_MATCHES}, {$DRIVE_LIFE_WARN}, etc.).

      NOTES:
      - Fuel-gauge and drive-stat OIDs come from the LENOVO-XCC-MIB but vary by model/firmware (e.g. SR665 does not expose fuelGaugePowerRemaining, SR655 does); validate via snmpwalk.
      - Disks/RAID require raidOOBCapable enabled (a dedicated item monitors this).
      - HBA FC discovery reuses the adapter-port table filtered by name: a port must match {$HBA_FC.NAME_MATCHES} AND must not match {$HBA_FC.NAME_NOT_MATCHES}. This keeps Ethernet NICs from Broadcom/Emulex/QLogic (which also make FC HBAs) out of the HBA rule. On some firmwares the HBA is not exposed over SNMP and needs Redfish/REST.
      - GPU: the MIB exposes inventory only (name/memory). GPU health/temperature are not available over SNMP; they require Redfish/REST.
      - Network interface here = adapter/link status (not traffic/errors). For bps/errors use the IF-MIB on the OS or the switch.
      - Component alerts (fan, overall health, memory, CPU, disk, voltage) are suppressed while the server is powered off (dependency on the 'Server is powered off' trigger).
      - Host inventory: this template links hardware items (type, model, serial, name, vendor, CPU model) to host inventory fields. To populate them, set the host Inventory mode to Automatic (Data collection > Hosts > <host> > Inventory tab), or set Administration > General > Other configuration parameters > Default host inventory mode = Automatic.
      - PSU redundancy: the calculated item psu.failed.count sums the supply health codes; the redundancy trigger fires with 2+ supplies installed and at least one degraded.
    vendor:
      name: Custom
      version: '2.1'
    groups:
    - name: Templates/Servers Hardware
    items:
    - name: 'XCC: ICMP ping'
      type: SIMPLE
      key: icmpping
      delay: 1m
      history: 7d
      trends: 90d
      value_type: UNSIGNED
      description: ICMP availability of the management IP (XCC/BMC).
      tags:
      - tag: component
        value: availability
      uuid: 6f456587298d4afe9bfcb9df78326931
    - name: 'XCC: ICMP loss'
      type: SIMPLE
      key: icmppingloss
      delay: 1m
      history: 7d
      trends: 90d
      value_type: FLOAT
      units: '%'
      tags:
      - tag: component
        value: availability
      uuid: d88d698e4c8044fdbbb20b695569777b
    - name: 'XCC: ICMP response time'
      type: SIMPLE
      key: icmppingsec
      delay: 1m
      history: 7d
      trends: 90d
      value_type: FLOAT
      units: s
      tags:
      - tag: component
        value: availability
      uuid: 3eef1c2ed8094b8c8263423e3b1bbf11
    - name: SNMP availability
      type: INTERNAL
      key: zabbix[host,snmp,available]
      delay: 1m
      history: 7d
      trends: 90d
      value_type: UNSIGNED
      description: Availability state of the host SNMP interface in Zabbix.
      valuemap:
        name: snmp availability
      tags:
      - tag: component
        value: availability
      uuid: 803de97609594e48b3a0882c2a834f9a
    - name: Overall System Health Status
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.19046.11.1.1.4.1.0
      key: system.health.status
      delay: 2m
      history: 7d
      trends: 90d
      description: LENOVO-XCC-MIB::systemHealthStat (.1.1.4.1). Overall health status reported by the XCC.
      valuemap:
        name: systemHealthStat
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      tags:
      - tag: component
        value: health
      uuid: cd0fb5d345ed411f946ccc8cfd4ee6af
    - name: System power state
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.19046.11.1.5.1.1.0
      key: system.power.state
      delay: 2m
      history: 7d
      trends: 90d
      valuemap:
        name: currentSysPowerStatus
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      tags:
      - tag: component
        value: power
      uuid: 90ab31dd02b242d29f9242faaa88312d
    - name: System state (POST/boot)
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.19046.11.1.5.1.4.0
      key: system.state
      delay: 5m
      history: 7d
      trends: 90d
      valuemap:
        name: systemState
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      tags:
      - tag: component
        value: health
      uuid: d197a6fdc91347d6bb5039072a33cd0c
    - name: Machine Type
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.19046.11.1.1.5.2.1.1.0
      key: machine.type
      delay: 1h
      history: 7d
      trends: '0'
      value_type: TEXT
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      inventory_link: TYPE
      tags:
      - tag: component
        value: inventory
      uuid: b71de410190a48e88337aa290afee306
    - name: Machine Model
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.19046.11.1.1.5.2.1.2.0
      key: machine.model
      delay: 1h
      history: 7d
      trends: '0'
      value_type: TEXT
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      inventory_link: MODEL
      tags:
      - tag: component
        value: inventory
      uuid: f597fb4fca544d0c9e355c88f2222f36
    - name: Machine Serial Number
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.19046.11.1.1.5.2.1.3.0
      key: machine.serial
      delay: 1h
      history: 7d
      trends: '0'
      value_type: TEXT
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      inventory_link: SERIALNO_A
      tags:
      - tag: component
        value: inventory
      uuid: ec7c3961a1164b68973dcb957d9da169
    - name: Machine Name
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.19046.11.1.1.5.2.1.5.0
      key: machine.name
      delay: 1h
      history: 7d
      trends: '0'
      value_type: TEXT
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      inventory_link: NAME
      tags:
      - tag: component
        value: inventory
      uuid: 6cdda90fbc8a45baac547753a3ba629b
    - name: Vendor
      type: CALCULATED
      key: inventory.vendor
      params: '1'
      delay: 12h
      history: 7d
      trends: '0'
      value_type: TEXT
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - return 'Lenovo';
      inventory_link: VENDOR
      description: Valor fixo "Lenovo" para preencher o campo vendor do inventario.
      tags:
      - tag: component
        value: inventory
      uuid: 757a501951584accac14d3c5247c62c5
    - name: Fans installed (total)
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.19046.11.1.1.3.1.0
      key: fan.total
      delay: 10m
      history: 7d
      trends: 90d
      tags:
      - tag: component
        value: fan
      uuid: acdec4e1d70345d49a03c8d4af9ae54c
    - name: CPU model (CPU 1, for inventory)
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.19046.11.1.1.5.20.1.12.1
      key: cpu.model.inventory
      delay: 1h
      history: 14d
      trends: '0'
      value_type: TEXT
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      inventory_link: HARDWARE
      description: LENOVO-XCC-MIB::processorProductName da CPU 1 (indice .1). Popula o campo hardware do inventario. O modelo por-CPU (todas as CPUs) esta na regra Processor Discovery.
      tags:
      - tag: component
        value: cpu
      uuid: b20a971e2b29447a8a98e3378a7ab0fc
    - name: Total power in use
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.19046.11.1.1.10.1.10.0
      key: power.consumption
      delay: 1m
      history: 30d
      trends: 400d
      value_type: FLOAT
      units: W
      description: LENOVO-XCC-MIB::fuelGaugeTotalPowerInUse. Current total power draw in Watts.
      tags:
      - tag: component
        value: power
      uuid: 2cdc88ac60b54418be2ddd67ea30c580
    - name: Power consumption - CPU
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.19046.11.1.1.10.1.11.0
      key: power.consumption.cpu
      delay: 2m
      history: 14d
      trends: 180d
      value_type: FLOAT
      units: W
      description: LENOVO-XCC-MIB::fuelGaugePowerConsumptionCpu
      tags:
      - tag: component
        value: power
      uuid: 033312da26354f69b797bd29ecc6c2a2
    - name: Power consumption - Memory
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.19046.11.1.1.10.1.12.0
      key: power.consumption.memory
      delay: 2m
      history: 14d
      trends: 180d
      value_type: FLOAT
      units: W
      description: LENOVO-XCC-MIB::fuelGaugePowerConsumptionMemory
      tags:
      - tag: component
        value: power
      uuid: 210dc0b258c54238b63303e1e2b1e7c4
    - name: Power consumption - Other
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.19046.11.1.1.10.1.13.0
      key: power.consumption.other
      delay: 2m
      history: 14d
      trends: 180d
      value_type: FLOAT
      units: W
      description: LENOVO-XCC-MIB::fuelGaugePowerConsumptionOther
      tags:
      - tag: component
        value: power
      uuid: eee00dca05a74de5810766ec6a08d70a
    - name: Total power available (PSUs)
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.19046.11.1.1.10.1.9.0
      key: power.available
      delay: 10m
      history: 14d
      trends: 180d
      value_type: FLOAT
      units: W
      description: LENOVO-XCC-MIB::fuelGaugeTotalPowerAvailable. Total power-supply capacity.
      tags:
      - tag: component
        value: power
      uuid: 5cc3b82e95f44b8cada660f6d2ce0f21
    - name: Remaining power headroom
      type: CALCULATED
      key: power.remaining
      params: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/power.available)-last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/power.consumption)
      delay: 10m
      history: 14d
      trends: 180d
      value_type: FLOAT
      units: W
      description: 'Calculated: available power (fuelGaugeTotalPowerAvailable) minus total power in use (fuelGaugeTotalPowerInUse). Replaces fuelGaugePowerRemaining, which not all models expose (SR665 does not, SR655 does). Interval aligned to 10m (the slowest input) so it is not evaluated before inputs have collected.'
      preprocessing:
      - type: CHECK_NOT_SUPPORTED
        parameters:
        - '-1'
        error_handler: DISCARD_VALUE
      tags:
      - tag: component
        value: power
      uuid: f9640dd133324cccbe2d2f9c400ebffa
    - name: 'PSU: total installed'
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.19046.11.1.1.11.1.0
      key: psu.installed.count
      delay: 10m
      history: 7d
      trends: 90d
      value_type: UNSIGNED
      description: LENOVO-XCC-MIB::powerNumber. Number of installed power supplies.
      tags:
      - tag: component
        value: psu
      uuid: 88a347be8e64463c977c4aae1b52b815
    - name: 'PSU: failed supplies (count)'
      type: CALCULATED
      key: psu.failed.count
      delay: 3m
      history: 7d
      trends: 90d
      value_type: UNSIGNED
      params: sum(last_foreach(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/psu.health.code[*]))
      description: Sum of power-supply health codes (0=Normal, 1=not Normal). Basis for redundancy-loss detection. If no supply has been discovered yet (empty foreach), returns 0 via error handling.
      preprocessing:
      - type: CHECK_NOT_SUPPORTED
        parameters:
        - '-1'
        error_handler: CUSTOM_VALUE
        error_handler_params: '0'
      tags:
      - tag: component
        value: psu
      uuid: fee0ba54e6644952bd174f062c72ae82
    - name: Power On Hours
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.19046.11.1.5.1.2.0
      key: system.power_on_hours
      delay: 1h
      history: 7d
      trends: 90d
      units: uptime
      tags:
      - tag: component
        value: health
      uuid: 128daa7f5644455989397bab73825684
    - name: XCC Restart Count
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.4.1.19046.11.1.5.1.3.0
      key: xcc.restart_count
      delay: 10m
      history: 30d
      trends: 90d
      tags:
      - tag: component
        value: health
      uuid: 01881e8d04d541cf92b6b6705dcc5b07
    - name: RAID Out-of-band capable
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.4.1.19046.11.1.1.13.1.1.0
      key: raid.oob_capable
      delay: 1h
      history: 7d
      trends: 90d
      description: If disabled, RAID/disk items over SNMP will not be available.
      valuemap:
        name: raidoobcapable
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      tags:
      - tag: component
        value: storage
      uuid: ea7bf45df02e4e1286aec329080d3e1b
    - name: SNMP Trap (XCC)
      type: SNMP_TRAP
      key: snmptrap["Lenovo XCC"]
      delay: '0'
      history: 90d
      trends: '0'
      value_type: LOG
      logtimefmt: hh:mm:ss yyyy/MM/dd
      description: XCC SNMP traps (real-time events). Configure the destination under BMC Configuration > Notification > SNMP Trap.
      tags:
      - tag: component
        value: health
      uuid: b9b6ded01f33425c916f187204202dca
    discovery_rules:
    - name: Fan Discovery
      type: SNMP_AGENT
      snmp_oid: discovery[{#FANINDEX},1.3.6.1.4.1.19046.11.1.1.3.2.1.1]
      key: fan.discovery
      description: LENOVO-XCC-MIB::fanIndex
      uuid: 7fbac31c69234c6abb87da9fb071d7a5
      lifetime: 30d
      enabled_lifetime_type: DISABLE_NEVER
      item_prototypes:
      - name: 'Fan {#FANINDEX}: Description'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.19046.11.1.1.3.2.1.2.{#FANINDEX}
        key: fan.descr[{#FANINDEX}]
        history: 7d
        value_type: TEXT
        trends: '0'
        preprocessing:
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        tags:
        - tag: component
          value: fan
        uuid: ec00d3d17dd8441892ccc53533a828c8
      - name: 'Fan {#FANINDEX}: Speed raw'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.19046.11.1.1.3.2.1.3.{#FANINDEX}
        key: fan.speed.raw[{#FANINDEX}]
        history: 7d
        value_type: TEXT
        trends: '0'
        description: String 'ddd% of maximum' or 'Offline'.
        tags:
        - tag: component
          value: fan
        uuid: 8ab459f606014a4d96e541f94c0f2e79
      - name: 'Fan {#FANINDEX}: Speed'
        type: DEPENDENT
        key: fan.speed[{#FANINDEX}]
        master_item:
          key: fan.speed.raw[{#FANINDEX}]
        history: 7d
        trends: 90d
        value_type: UNSIGNED
        units: '%'
        description: Fan speed as a percentage of maximum RPM, extracted from the string. "Offline" is discarded.
        preprocessing:
        - type: REGEX
          parameters:
          - (\d+)\s*%
          - \1
          error_handler: DISCARD_VALUE
        tags:
        - tag: component
          value: fan
        uuid: d95af00ea1174a8fa8f24407f9b5281d
      - name: 'Fan {#FANINDEX}: Health status'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.19046.11.1.1.3.2.1.10.{#FANINDEX}
        key: fan.status[{#FANINDEX}]
        history: 30d
        value_type: TEXT
        trends: '0'
        preprocessing:
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        tags:
        - tag: component
          value: fan
        uuid: 617a9bc234174a29ab855b11a347e064
        trigger_prototypes:
        - expression: find(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/fan.status[{#FANINDEX}],,,"{$FAN_OK_STATUS}")=0
          name: 'Fan {#FANINDEX}: not in OK state'
          priority: WARNING
          manual_close: 'YES'
          uuid: 07adbca2c90d4e71a845ae75ecfd9174
          dependencies:
          - name: Server is powered off
            expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665-HX650-VX650 by XCC SNMP/system.power.state)<>255
    - name: Memory Module Discovery
      type: SNMP_AGENT
      snmp_oid: discovery[{#MEMINDEX},1.3.6.1.4.1.19046.11.1.1.5.21.1.1,{#MEMDESCR},1.3.6.1.4.1.19046.11.1.1.5.21.1.2,{#MEMTYPE},1.3.6.1.4.1.19046.11.1.1.5.21.1.6]
      key: memory.discovery
      description: LENOVO-XCC-MIB::systemMemoryVpdTable
      uuid: 8e20b9007ab94abb81613532a36d11ae
      lifetime: 30d
      enabled_lifetime_type: DISABLE_NEVER
      item_prototypes:
      - name: '{#MEMDESCR} ({#MEMTYPE}): Status'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.19046.11.1.1.5.21.1.8.{#MEMINDEX}
        key: memory.status[{#MEMINDEX}]
        history: 30d
        value_type: TEXT
        trends: '0'
        preprocessing:
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        tags:
        - tag: component
