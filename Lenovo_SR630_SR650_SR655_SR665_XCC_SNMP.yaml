    macros:
    - macro: '{$DISK_OK_STATUS}'
      value: Normal
    - macro: '{$FAN_OK_STATUS}'
      value: Normal
    - macro: '{$PSU_OK_STATUS}'
      value: Normal
    - macro: '{$HEALTH_CRIT_STATUS}'
      value: '2'
    - macro: '{$HEALTH_DISASTER_STATUS}'
      value: '0'
    - macro: '{$HEALTH_WARN_STATUS}'
      value: '4'
    - macro: '{$NAME.NOT_MATCHES}'
      value: DTS
      description: Excludes internal temperature sensors (DTS) from discovery
    - macro: '{$TEMP_CRIT}'
      value: '60'
    - macro: '{$TEMP_CRIT:"Ambient"}'
      value: '35'
    - macro: '{$TEMP_CRIT_LOW}'
      value: '5'
    - macro: '{$TEMP_WARN}'
      value: '50'
    - macro: '{$TEMP_WARN:"Ambient"}'
      value: '32'
    - macro: '{$POWER_MAX}'
      value: '1400'
      description: Power draw (W) above which an alert is raised. Adjust to the installed power supply/supplies.
    - macro: '{$HBA_FC.NAME_MATCHES}'
      value: .*([Ff]ibre.?[Cc]hannel| FC |FC$|LPe[0-9]|LPm[0-9]|QLE[0-9]|QLogic.*FC|Emulex.*FC).*
      description: Regex that matches genuine Fibre Channel HBAs in the adapter port table. A port must match this AND must NOT match {$HBA_FC.NAME_NOT_MATCHES}. Adjust to the name reported by your HBA.
    - macro: '{$HBA_FC.NAME_NOT_MATCHES}'
      value: .*([Ee]thernet|OCP| ?GbE|RoCE|iSCSI|SFP28|10/25|10/40|NIC|RDMA|BASE-T).*
      description: Regex that excludes Ethernet/NIC adapters from HBA FC discovery. Broadcom/Emulex/QLogic also make Ethernet NICs, so a name matching these terms is treated as a network card, not an HBA.
    - macro: '{$GPU.NAME_MATCHES}'
      value: .*(NVIDIA|Tesla|A2|A10|A16|A30|A40|A100|L4|L40|H100|GPU).*
      description: Regex used to identify GPUs. Inventory only (the XCC MIB does not expose GPU health/temperature via SNMP).
    - macro: '{$SNMP.TIMEOUT}'
      value: 10m
      description: No-data window that characterizes loss of SNMP polling.
    - macro: '{$ICMP_LOSS_WARN}'
      value: '20'
    - macro: '{$ICMP_RESPONSE_TIME_WARN}'
      value: '0.15'
    - macro: '{$DRIVE_LIFE_WARN}'
      value: '10'
      description: SSD remaining-life percentage below which an alert is raised.
    - macro: '{$TRAP.SEVERITY_MATCHES}'
      value: (?i)(critical|error|fail|fault|non-recover)
      description: Severity regex for XCC traps that should raise a HIGH alert.
    valuemaps:
    - uuid: cbbef7b7bea243ed83131a513f67cc0f
      name: systemHealthStat
      mappings:
      - value: '0'
        newvalue: nonRecoverable
      - value: '2'
        newvalue: critical
      - value: '4'
        newvalue: nonCritical
      - value: '255'
        newvalue: normal
    - uuid: 4354c89b30fe4e809384569f833167c3
      name: currentSysPowerStatus
      mappings:
      - value: '0'
        newvalue: poweredOff
      - value: '1'
        newvalue: sleepS3
      - value: '255'
        newvalue: poweredOn
    - uuid: 98f3d981e312442ebd8497618592d008
      name: ledstate
      mappings:
      - value: '0'
        newvalue: 'off'
      - value: '1'
        newvalue: 'on'
      - value: '2'
        newvalue: blinking
    - uuid: 991a937e1ef848289ef855a4382bcaa9
      name: raid ctrl batbck
      mappings:
      - value: '0'
        newvalue: uninstalled
      - value: '1'
        newvalue: installed
      - value: '2'
        newvalue: unknown
    - uuid: 79de7aa446034348afe57877df19d0b5
      name: raidoobcapable
      mappings:
      - value: '0'
        newvalue: disabled
      - value: '1'
        newvalue: enabled
    - uuid: 98f7953b066f4eaa9f25043c7d7b019f
      name: systemState
      mappings:
      - value: '0'
        newvalue: systemPowerOffOrStateUnknown
      - value: '1'
        newvalue: systemPowerOnOrStartingUEFI
      - value: '2'
        newvalue: systemInUEFI
      - value: '3'
        newvalue: uEFIErrorDetected
      - value: '4'
        newvalue: bootingOSorInUnsupportedOS
      - value: '5'
        newvalue: oSBooted
      - value: '6'
        newvalue: suspendToRAM
      - value: '7'
        newvalue: systemInSetup
      - value: '8'
        newvalue: systemInLXPMMaintenanceMode
      - value: '9'
        newvalue: systemInMemoryTest
    - uuid: 7d0fb7424e1a4e53a66f9c6c68f0b714
      name: snmp availability
      mappings:
      - value: '0'
        newvalue: not available
      - value: '1'
        newvalue: available
      - value: '2'
        newvalue: unknown
  triggers:
  - expression: max(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/icmpping,3m)=0
    name: 'XCC: not responding to ICMP (unreachable)'
    priority: HIGH
    description: The XCC management IP has not answered ping for 3 minutes.
    uuid: 0a2df973d5f243c69b690e5e47a1f923
  - expression: min(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN}
    name: 'XCC: perda de pacotes ICMP alta (>{$ICMP_LOSS_WARN}%)'
    priority: WARNING
    dependencies:
    - name: 'XCC: not responding to ICMP (unreachable)'
      expression: max(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/icmpping,3m)=0
    uuid: 88c2c07f446845dbbfddaec59c53950d
  - expression: max(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/zabbix[host,snmp,available],5m)=0
    name: 'SNMP: XCC agent is not responding'
    priority: AVERAGE
    description: Zabbix flagged the SNMP interface as unavailable. Check credentials, the SNMP ACL on the XCC, and connectivity.
    dependencies:
    - name: 'XCC: not responding to ICMP (unreachable)'
      expression: max(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/icmpping,3m)=0
    uuid: ba8a562664fa480aab4ee9eeed974563
  - expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/system.health.status)={$HEALTH_CRIT_STATUS} or last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/system.health.status)={$HEALTH_DISASTER_STATUS}
    name: Overall system health is CRITICAL
    priority: HIGH
    manual_close: 'YES'
    dependencies:
    - name: Server is powered off
      expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/system.power.state)<>255
    uuid: feefc19e7854458da0d6712a0afed987
  - expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/system.health.status)={$HEALTH_WARN_STATUS}
    name: Overall system health is degraded (non-critical)
    priority: WARNING
    manual_close: 'YES'
    dependencies:
    - name: Server is powered off
      expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/system.power.state)<>255
    uuid: d7802a35e53c4cccbb736415cc0386a1
  - expression: nodata(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/system.health.status,{$SNMP.TIMEOUT})=1
    name: 'SNMP: no data from XCC for {$SNMP.TIMEOUT}'
    priority: AVERAGE
    description: No SNMP data received within the defined window. Distinguishes "component OK" from "polling stopped".
    dependencies:
    - name: 'SNMP: XCC agent is not responding'
      expression: max(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/zabbix[host,snmp,available],5m)=0
    - name: 'XCC: not responding to ICMP (unreachable)'
      expression: max(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/icmpping,3m)=0
    uuid: 9d604348565d4fae952c995752172770
  - expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/system.power.state)<>255
    name: Server is powered off
    priority: INFO
    description: currentSysPowerStatus indicates the server is not powered on (255=poweredOn). The XCC keeps answering SNMP. While active, this trigger suppresses component alerts (fan, overall health, etc.) to avoid false positives.
    manual_close: 'YES'
    uuid: fb30c12ffec04cf79eaf58aa64f5f0e4
  - expression: avg(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/power.consumption,5m)>{$POWER_MAX}
    name: 'Power draw above threshold: >{$POWER_MAX}W'
    priority: WARNING
    description: 'Last value: {ITEM.LASTVALUE1}. Check workload and power-supply redundancy.'
    manual_close: 'YES'
    uuid: 0432e1c3de014943a22d5e4f9da77dc8
  - expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/psu.failed.count)>=1 and last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/psu.installed.count)>=2
    name: 'PSU: redundancy lost (one or more supplies degraded)'
    priority: HIGH
    description: With 2+ supplies installed, at least one is not in Normal state - the system has lost N+N redundancy.
    manual_close: 'YES'
    uuid: ebd11952769f4fe295a613ccc3b2048e
  - expression: last(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/raid.oob_capable)=0
    name: RAID Out-of-band monitoring is disabled on the XCC
    priority: INFO
    description: Enable it under BMC Configuration > Storage in the XCC to collect disks and controllers.
    manual_close: 'YES'
    uuid: 0fbd69b646eb4003a2c9ddf0f07ae3e0
  - expression: find(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/snmptrap["Lenovo XCC"],,"iregexp","{$TRAP.SEVERITY_MATCHES}")=1
    name: High-severity trap received from XCC
    priority: HIGH
    description: 'Last trap: {ITEM.LASTVALUE1}. Trap whose text matched {$TRAP.SEVERITY_MATCHES}.'
    manual_close: 'YES'
    uuid: bda4fc8ec995465c823e3d20202f0d29
  - expression: find(/Lenovo ThinkSystem SR630-SR650-SR655-SR665 by XCC SNMP/snmptrap["Lenovo XCC"],,"iregexp","(?i)(warning|non-critical|degrad)")=1
    name: Warning trap received from XCC
    priority: WARNING
    description: 'Last trap: {ITEM.LASTVALUE1}.'
    manual_close: 'YES'
    uuid: 69dde0f3917b4440bc21b54c111a8c41
