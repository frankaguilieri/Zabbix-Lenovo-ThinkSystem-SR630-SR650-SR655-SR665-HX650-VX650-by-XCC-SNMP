      - value: '4'
        newvalue: bootingOSorInUnsupportedOS
      - value: '5'
        newvalue: oSBooted
      - value: '6'
        newvalue: suspendToRAM
      - value: '7'
        newvalue: systemInSetup
      - value: '8'
        newvalue: systemInLXPMMaintenanceMode
      - value: '9'
        newvalue: systemInMemoryTest
    - uuid: ad0c14992bb04f9b9fccc283a7bd0d36
